<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PHANTOM POWER</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{background:#08080e;color:#c8c8e0;font-family:system-ui;padding:10px;padding-bottom:80px}
.card{background:#12121c;border-radius:16px;padding:14px;margin-bottom:10px;border:1px solid #24243a}
.card-title{font-weight:700;font-size:14px;margin-bottom:8px;color:#8b7cf0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.btn{background:#1a1a2e;color:#8888aa;border:none;padding:10px 0;border-radius:10px;font-weight:600;font-size:12px;cursor:pointer;transition:0.15s}
.btn:active{transform:scale(0.94)}
.btn.on{background:#1e3a5a;color:#6aafff}
.btn.off{background:#1a1a2e;color:#666688}
.btn.success{background:#0e2a0e;color:#44dd88}
.btn.danger{background:#2a0e0e;color:#dd4444}
.btn.full{width:100%}
.slider-row{display:flex;align-items:center;gap:10px;margin:5px 0}
.slider-row input[type="range"]{flex:1;accent-color:#8b7cf0;height:4px;background:#1a1a2a;border-radius:4px}
.slider-row span{font-size:12px;min-width:28px;color:#8b7cf0}
.status{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px}
.status.online{background:#0a1a0e;color:#44dd88;border:1px solid #1a3a2a}
.status.offline{background:#1a0a0a;color:#dd4444;border:1px solid #3a1a1a}
.console{background:#08080e;border-radius:10px;padding:8px;max-height:150px;overflow-y:auto;font-size:10px;font-family:monospace;border:1px solid #1a1a2a;line-height:1.6}
.console div{padding:2px 4px;border-bottom:1px solid #0e0e18;color:#777799}
.console .sent{color:#6aafff}
.console .recv{color:#44dd88}
.console .error{color:#dd4444}
.tab-bar{display:flex;gap:4px;overflow-x:auto;padding-bottom:6px}
.tab-bar .tab{padding:8px 14px;border-radius:10px;background:#12121c;border:1px solid #1e1e32;font-size:12px;font-weight:600;color:#666688;cursor:pointer;white-space:nowrap}
.tab-bar .tab.active{background:#1a2a4a;color:#8b7cf0;border-color:#3a4a7a}
.tab-content{display:none}
.tab-content.active{display:block}
input,select{width:100%;padding:8px 10px;background:#0e0e1a;border:1px solid #1e1e32;color:#c8c8e0;border-radius:8px;font-size:12px;outline:none}
input:focus,select:focus{border-color:#8b7cf0}
.connect-row{display:flex;gap:6px;margin:4px 0}
.connect-row input{flex:1;margin-bottom:0}
.connect-row .btn{padding:8px 14px;white-space:nowrap}
.footer{position:fixed;bottom:0;left:0;right:0;background:#08080e;padding:6px 12px;border-top:1px solid #12121c;display:flex;justify-content:space-between;font-size:9px;color:#444466;z-index:999}
.loader{border:3px solid #1a1a2a;border-top:3px solid #8b7cf0;border-radius:50%;width:22px;height:22px;animation:spin .8s linear infinite;margin:6px auto}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360)}}
.hidden{display:none!important}
.mt-1{margin-top:6px}
</style>
</head>
<body>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <span style="font-weight:800;font-size:18px;color:#8b7cf0;">◆ PHANTOM POWER</span>
    <span class="status offline" id="statusDisplay">● OFFLINE</span>
  </div>
  <div class="connect-row">
    <input type="text" id="manualIP" placeholder="IP:PORT (e.g., 192.168.1.42:8080)">
    <button class="btn success" onclick="manualConnect()">CONNECT</button>
  </div>
  <button class="btn success full" style="margin:4px 0;" onclick="discoverEmulator()">🔍 SCAN</button>
  <div style="font-size:10px;color:#555;margin-top:4px;" id="emulatorStatus">📱 Enter IP or tap SCAN</div>
</div>

<div class="tab-bar">
  <div class="tab active" data-tab="aimbot">🎯</div>
  <div class="tab" data-tab="esp">👁️</div>
  <div class="tab" data-tab="console">📟</div>
</div>

<div class="tab-content active" id="tab-aimbot">
  <div class="card">
    <div class="card-title">🎯 Aimbot</div>
    <select id="aimbotModeSelect"><option value="head">Head</option><option value="neck">Neck</option></select>
    <div class="grid3 mt-1">
      <button class="btn on" data-cmd="aimbotscan">SCAN</button>
      <button class="btn off" data-cmd="aimbotenable">ON</button>
      <button class="btn on" data-cmd="aimbotdisable">OFF</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">📏 Sliders</div>
    <div class="slider-row"><span>FOV</span><input type="range" min="0" max="1000" value="100" data-slider="Aimfov"><span id="val-Aimfov">100</span></div>
    <div class="slider-row"><span>SMOOTH</span><input type="range" min="0" max="100" value="0" data-slider="AimSmooth"><span id="val-AimSmooth">0</span></div>
    <div class="slider-row"><span>RANGE</span><input type="range" min="0" max="200" value="100" data-slider="Distance"><span id="val-Distance">100</span></div>
  </div>
</div>

<div class="tab-content" id="tab-esp">
  <div class="card">
    <div class="card-title">👁️ ESP</div>
    <div class="grid2">
      <button class="btn off" data-cmd="espcornerboxOn">BOX</button>
      <button class="btn off" data-cmd="espnameOn">NAME</button>
    </div>
    <div class="grid2 mt-1">
      <button class="btn off" data-cmd="espskeletonOn">SKEL</button>
      <button class="btn off" data-cmd="esphealthOn">HP</button>
    </div>
  </div>
</div>

<div class="tab-content" id="tab-console">
  <div class="card">
    <div class="card-title">📟 Logs</div>
    <div class="console" id="consoleLog"><div class="info">⏳ Ready</div></div>
    <button class="btn full mt-1" onclick="clearConsole()">Clear</button>
  </div>
</div>

<div class="footer"><span id="sessionDisplay">⚡ idle</span><span>🔒 zero-trace</span></div>

<script>
// ============================================================
// PHANTOM POWER — No Cloudflare, Pure HTTP
// ============================================================

let emulatorIP = null;
let emulatorPort = null;
let isConnected = false;
let aimbotAddresses = [];
let originalValues = [];

// ---- MANUAL CONNECT ----
function manualConnect() {
  const input = document.getElementById('manualIP').value.trim();
  if (!input) { addConsole('⚠️ Enter IP:PORT', 'error'); return; }
  const parts = input.split(':');
  if (parts.length !== 2) { addConsole('⚠️ Use IP:PORT', 'error'); return; }
  const ip = parts[0].trim();
  const port = parseInt(parts[1].trim()) || 8080;
  if (!ip.match(/^(\d{1,3}\.){3}\d{1,3}$/)) { addConsole('⚠️ Invalid IP', 'error'); return; }

  emulatorIP = ip;
  emulatorPort = port;
  isConnected = true;
  document.getElementById('statusDisplay').textContent = '● ONLINE';
  document.getElementById('statusDisplay').className = 'status online';
  document.getElementById('emulatorStatus').textContent = '📱 ' + ip + ':' + port;
  document.getElementById('sessionDisplay').textContent = '📍 ' + ip;
  addConsole('✅ Connected to ' + ip + ':' + port, 'recv');
}

// ---- ADB SHELL (HTTP POST) ----
async function adbShell(cmd) {
  if (!emulatorIP) return null;
  try {
    const url = `http://${emulatorIP}:${emulatorPort}/`;
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cmd: cmd })
    });
    const data = await res.json();
    return data.output || '';
  } catch(e) {
    addConsole('⚠️ ADB failed: ' + e.message, 'error');
    return null;
  }
}

// ---- GET GAME PID ----
async function getGamePID() {
  const pkgs = ['com.dts.freefireth','com.dts.freefiremax','com.tencent.ig'];
  for (let p of pkgs) {
    const out = await adbShell(`ps | grep ${p}`);
    if (out) {
      const parts = out.trim().split(/\s+/);
      if (parts.length >= 2) {
        const pid = parseInt(parts[1]);
        if (!isNaN(pid) && pid > 0) {
          addConsole('✅ Game: ' + p + ' (PID: ' + pid + ')', 'recv');
          return pid;
        }
      }
    }
  }
  return null;
}

// ---- READ MEMORY ----
async function readMemory(pid, addr, size) {
  const hex = await adbShell(`dd if=/proc/${pid}/mem bs=1 skip=${addr} count=${size} 2>/dev/null | xxd -p`);
  return hex ? hex.trim().replace(/\n/g, '') : '';
}

// ---- WRITE MEMORY ----
async function writeMemory(pid, addr, hexData) {
  await adbShell(`echo "${hexData}" | xxd -r -p | dd of=/proc/${pid}/mem bs=1 seek=${addr} conv=notrunc 2>/dev/null`);
}

// ---- PATTERN SCAN ----
async function patternScan(pid, pattern, start=0x1000000, end=0x60000000) {
  const pBytes = pattern.split(' ').map(b => b === '??' ? null : parseInt(b, 16));
  const chunk = 0x20000;
  const found = [];
  for (let addr = start; addr < end && found.length < 10; addr += chunk) {
    const hex = await readMemory(pid, addr, chunk);
    if (!hex) continue;
    const bytes = [];
    for (let i=0; i<hex.length; i+=2) bytes.push(parseInt(hex.substr(i,2), 16));
    for (let i=0; i<bytes.length - pBytes.length; i++) {
      let match = true;
      for (let j=0; j<pBytes.length; j++) {
        if (pBytes[j] !== null && bytes[i+j] !== pBytes[j]) { match = false; break; }
      }
      if (match) found.push(addr + i);
    }
  }
  return found;
}

// ---- HEADLOAD ----
async function HEADLOAD() {
  const pid = await getGamePID();
  if (!pid) return '❌ Game not found';
  const pattern = "FF FF 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 FF FF FF FF FF FF FF FF FF FF FF FF 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? 00 00 00 00 00 00 00 00 00 00 00 00 00 00 A5 43";
  const addrs = await patternScan(pid, pattern);
  if (addrs.length === 0) return '❌ Pattern not found';
  aimbotAddresses = addrs;
  return '✅ Headshot Loaded (' + addrs.length + ')';
}

async function HEADON() {
  if (!aimbotAddresses.length) return '❌ Run SCAN first';
  const pid = await getGamePID();
  if (!pid) return '❌ Game not found';
  originalValues = [];
  for (let addr of aimbotAddresses) {
    const orig = await readMemory(pid, addr+178, 4);
    if (orig) originalValues.push({ addr: addr+178, original: orig });
    const repl = await readMemory(pid, addr+182, 4);
    if (repl) await writeMemory(pid, addr+178, repl);
  }
  return '✅ Headshot Enabled';
}

async function HEADOFF() {
  if (!originalValues.length) return '❌ No values';
  const pid = await getGamePID();
  if (!pid) return '❌ Game not found';
  for (let item of originalValues) await writeMemory(pid, item.addr, item.original);
  originalValues = [];
  return '✅ Headshot Disabled';
}

// ---- NECK ----
async function NECKLOAD() {
  const pid = await getGamePID();
  if (!pid) return '❌ Game not found';
  const pattern = "FF FF 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 FF FF FF FF FF FF FF FF FF FF FF FF 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 00 ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? ?? 00 00 00 00 00 00 00 00 00 00 00 00 00 00 A5 43";
  const addrs = await patternScan(pid, pattern);
  if (addrs.length === 0) return '❌ Pattern not found';
  aimbotAddresses = addrs;
  return '✅ Neckshot Loaded (' + addrs.length + ')';
}
async function NECKON() {
  if (!aimbotAddresses.length) return '❌ Run SCAN first';
  const pid = await getGamePID();
  if (!pid) return '❌ Game not found';
  originalValues = [];
  for (let addr of aimbotAddresses) {
    const orig = await readMemory(pid, addr+178, 4);
    if (orig) originalValues.push({ addr: addr+178, original: orig });
    const repl = await readMemory(pid, addr+230, 4);
    if (repl) await writeMemory(pid, addr+178, repl);
  }
  return '✅ Neckshot Enabled';
}
async function NECKOFF() {
  if (!originalValues.length) return '❌ No values';
  const pid = await getGamePID();
  if (!pid) return '❌ Game not found';
  for (let item of originalValues) await writeMemory(pid, item.addr, item.original);
  originalValues = [];
  return '✅ Neckshot Disabled';
}

// ---- EXECUTE ----
async function executeCommand(cmd, args) {
  if (!emulatorIP) { addConsole('⚠️ Connect first', 'error'); return; }
  const mode = document.getElementById('aimbotModeSelect')?.value || 'head';

  const espMap = {
    'espcornerboxOn': 'echo "1" > /data/local/tmp/esp_box',
    'espcornerboxOff': 'echo "0" > /data/local/tmp/esp_box',
    'espnameOn': 'echo "1" > /data/local/tmp/esp_name',
    'espnameOff': 'echo "0" > /data/local/tmp/esp_name',
    'espskeletonOn': 'echo "1" > /data/local/tmp/esp_skeleton',
    'espskeletonOff': 'echo "0" > /data/local/tmp/esp_skeleton',
    'esphealthOn': 'echo "1" > /data/local/tmp/esp_hp',
    'esphealthOff': 'echo "0" > /data/local/tmp/esp_hp',
  };

  if (cmd === 'aimbotscan') {
    const result = await (mode === 'head' ? HEADLOAD() : NECKLOAD());
    addConsole(result, 'recv');
    return;
  }
  if (cmd === 'aimbotenable') {
    const result = await (mode === 'head' ? HEADON() : NECKON());
    addConsole(result, 'recv');
    return;
  }
  if (cmd === 'aimbotdisable') {
    const result = await (mode === 'head' ? HEADOFF() : NECKOFF());
    addConsole(result, 'recv');
    return;
  }
  if (espMap[cmd]) {
    await adbShell(espMap[cmd]);
    addConsole('✅ ' + cmd, 'recv');
    return;
  }
  if (['Aimfov','AimSmooth','Distance'].includes(cmd)) {
    await adbShell(`echo "${args?.value||0}" > /data/local/tmp/${cmd}`);
    addConsole('✅ ' + cmd + ' = ' + (args?.value||0), 'recv');
    return;
  }
  addConsole('⚠️ Unknown: ' + cmd, 'error');
}

// ---- UI ----
function addConsole(msg, type='info') {
  const el = document.getElementById('consoleLog');
  const div = document.createElement('div');
  const t = new Date().toLocaleTimeString('en-GB', { hour12: false });
  div.innerHTML = `<span style="color:#444466;">[${t}]</span> ${msg}`;
  div.className = type;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}
function clearConsole() { document.getElementById('consoleLog').innerHTML = ''; }

// ---- DISCOVER ----
async function getLocalIP() {
  return new Promise(resolve => {
    const pc = new RTCPeerConnection({ iceServers: [] });
    pc.createDataChannel('');
    pc.createOffer().then(o => pc.setLocalDescription(o)).catch(()=>{});
    pc.onicecandidate = (ice) => {
      if (!ice.candidate) return;
      const m = ice.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/);
      if (m && !m[1].startsWith('127.')) { resolve(m[1]); pc.close(); }
    };
    setTimeout(() => resolve(null), 2000);
  });
}
async function discoverEmulator() {
  const ports = [8080, 5555, 5556, 5557];
  const ips = ['127.0.0.1', '10.0.2.2'];
  const localIP = await getLocalIP();
  if (localIP) ips.unshift(localIP);
  if (localIP) {
    const base = localIP.split('.').slice(0,3).join('.');
    for (let i=1; i<255; i+=4) ips.push(`${base}.${i}`);
  }
  ips.push('192.168.1.100','192.168.0.100','192.168.2.100');
  for (let ip of [...new Set(ips)]) {
    for (let port of ports) {
      try {
        await fetch(`http://${ip}:${port}/`, { method:'HEAD', mode:'no-cors', signal:AbortSignal.timeout(150) });
        emulatorIP = ip; emulatorPort = port; isConnected = true;
        document.getElementById('statusDisplay').textContent = '● ONLINE';
        document.getElementById('statusDisplay').className = 'status online';
        document.getElementById('emulatorStatus').textContent = '📱 ' + ip + ':' + port;
        document.getElementById('manualIP').value = ip + ':' + port;
        addConsole('✅ Emulator: ' + ip + ':' + port, 'recv');
        return;
      } catch(e) {}
    }
  }
  addConsole('❌ Emulator not found', 'error');
}

// ---- EVENTS ----
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + this.dataset.tab).classList.add('active');
  });
});
document.querySelectorAll('[data-cmd]').forEach(btn => {
  btn.addEventListener('click', function() {
    const cmd = this.dataset.cmd;
    executeCommand(cmd);
    if (cmd.endsWith('On') || cmd.endsWith('Enable')) {
      this.className = 'btn on';
      const siblings = this.parentElement.querySelectorAll('[data-cmd]');
      siblings.forEach(s => {
        if (s !== this && (s.dataset.cmd.endsWith('Off') || s.dataset.cmd.endsWith('Disable'))) {
          s.className = 'btn off';
        }
      });
    }
    if (cmd.endsWith('Off') || cmd.endsWith('Disable')) {
      this.className = 'btn on';
      const siblings = this.parentElement.querySelectorAll('[data-cmd]');
      siblings.forEach(s => {
        if (s !== this && (s.dataset.cmd.endsWith('On') || s.dataset.cmd.endsWith('Enable'))) {
          s.className = 'btn off';
        }
      });
    }
  });
});
document.querySelectorAll('[data-slider]').forEach(slider => {
  slider.addEventListener('input', function() {
    const name = this.dataset.slider;
    const val = this.value;
    document.getElementById('val-' + name).textContent = val;
    executeCommand(name, { value: val });
  });
});
setTimeout(discoverEmulator, 1500);
console.log('⚡ PHANTOM POWER — No Cloudflare');
</script>
</body>
</html>
